name: kigali_directory
description: Kigali City Services & Places Directory - A mobile app helping Kigali residents find essential public services and lifestyle locations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0

  # State Management
  provider: ^6.1.1

  # Maps & Location
  google_maps_flutter: ^2.5.3
  url_launcher: ^6.2.2

  # Utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
